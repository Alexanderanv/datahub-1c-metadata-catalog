# Для удаления 1С-сущностей, пропавших из текущего набора загрузки, добавьте
# стабильный pipeline_name и включите stateful_ingestion в source.config ниже:
#
# pipeline_name: onec-${ONEC_INFOBASE_NAME}-${DATAHUB_ENV:-DEV}
#
source:
  type: 1c-enterprise
  config:
    base_url: ${ONEC_BASE_URL}
    username: ${ONEC_USERNAME}
    password: ${ONEC_PASSWORD}
    env: ${DATAHUB_ENV:-DEV}
    infobase:
      name: ${ONEC_INFOBASE_NAME}
      display_name: ${ONEC_INFOBASE_DISPLAY_NAME:-${ONEC_INFOBASE_NAME}}

    metadata_uuid_source:
      config_dump_info_path: ${ONEC_CONFIG_DUMP_INFO_PATH}

    # Пустые списки означают "все объекты этого типа метаданных 1С".
    # Для общей установки DataHub лучше указывать явные имена объектов.
    # Табличные части можно фильтровать на уровне конкретного объекта:
    #
    # Documents:
    #   - ЗаказПокупателя:
    #       ingest_tabular_sections: true
    #       tabular_sections:
    #         - Работы
    #   - РасходнаяНакладная:
    #       ingest_tabular_sections: false
    #
    # Поле tabular_sections здесь является allow-list для объекта. Глобальный
    # common_filters.tabular_sections ниже является deny-list для всех объектов.
    object_filters:
      include_objects:
        Constants: []
        Catalogs: []
        Documents: []
        ChartsOfCharacteristicTypes: []
        ChartsOfAccounts: []
        ChartsOfCalculationTypes: []
        InformationRegisters: []
        AccumulationRegisters: []
        AccountingRegisters: []
        CalculationRegisters: []
        Enums: []
      common_filters:
        tabular_sections:
          - ДополнительныеРеквизиты

    # HTTP/Web-сервисы являются объектами метаданных 1С, но в DataHub
    # представляются как DataFlow/DataJob, а не как datasets.
    integration_services:
      include_services:
        HTTPServices: []
        WebServices: []

    ingestion:
      attributes: true
      tabular_sections: true
      lineage: true
      lineage_kinds:
        - basis
        - register_movement
        - manual_dataset_flow
      column_lineage: false
      db_mapping: true
      emit_db_siblings: ${ONEC_EMIT_DB_SIBLINGS:-true}
      emit_custom_aspects: ${ONEC_EMIT_CUSTOM_ASPECTS:-true}

    # Контролируемая очистка для 1С-сущностей. По умолчанию выключена, чтобы
    # пример не удалял уже загруженный каталог без явного включения.
    #
    # stateful_ingestion:
    #   enabled: true
    #   remove_stale_metadata: true
    #   fail_safe_threshold: 75.0
    #   state_provider:
    #     type: datahub
    #     config:
    #       server: ${DATAHUB_GMS_URL}
    #       token: ${DATAHUB_GMS_TOKEN:-}

    postgres:
      database: ${POSTGRES_DATABASE:-${ONEC_INFOBASE_NAME}}
      schema: ${POSTGRES_SCHEMA:-public}

sink:
  type: datahub-rest
  config:
    server: ${DATAHUB_GMS_URL}
    token: ${DATAHUB_GMS_TOKEN:-}
